<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Sneha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">
    <a id="backlink" href="https://rahiljamadar.github.io/sneha/">← Main Card</a>

    <div class="container">
      <div id="cardStack">
        <!-- Card 0: Start Button -->
        <div class="card active" id="firstCard">
          <button id="startBtn">Click to Start</button>
        </div>

        <!-- Card 1 -->
        <div class="card">
          <h2>Card 1 Title</h2>
          <h3>Tu Meri Saari Yaadein</h3>
          <img src="image1.jpg" alt="Image 1">
          <audio src="audio1.mp3" loop></audio>
        </div>

        <!-- Card 2 -->
        <div class="card">
          <h2>Card 2 Title</h2>
          <h3>Sapphire</h3>
          <img src="image2.jpg" alt="Image 2">
          <audio src="audio2.mp3" loop></audio>
        </div>

        <!-- Card 3 -->
        <div class="card">
          <h2>Card 3 Title</h2>
          <h3>Dilko Teri</h3>
          <img src="image3.jpg" alt="Image 3">
          <audio src="audio3.mp3" loop></audio>
        </div>

        <!-- Card 4 -->
        <div class="card">
          <h2>Card 4 Title</h2>
          <h3>Lafzon Se</h3>
          <img src="image4.jpg" alt="Image 4">
          <audio src="audio4.mp3" loop></audio>
        </div>

        <!-- Card 5 -->
        <div class="card">
          <h2>Card 5 Title</h2>
          <h3>Beat</h3>
          <img src="image5.jpg" alt="Image 5">
          <audio src="audio5.mp3" loop></audio>
        </div>

        <!-- Card 6: Video -->
        <div class="card">
          <h2>Card 6 Title</h2>
          <h3>Special Video</h3>
          <video src="video.mp4" controls></video>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="prevBtn">⟵ Previous</button>
        <button id="nextBtn">Next ⟶</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
